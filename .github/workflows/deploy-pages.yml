name: Sync main to gh-pages

# GitHub Pages は gh-pages ブランチから配信する設定。
# main が更新されたら gh-pages に自動反映して公開サイトを更新する。
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Push main to gh-pages
        run: git push origin main:gh-pages --force
